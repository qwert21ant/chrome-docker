services:
  chrome:
    build: .
    image: qwert21ant/chrome-docker:latest
    ports:
      - "9111:9111"   # Chrome DevTools Protocol
      - "5900:5900"   # VNC (when enabled)
    environment:
      - SCREEN_WIDTH=1920
      - SCREEN_HEIGHT=1080
      - SCREEN_DEPTH=24
      - ENABLE_VNC=true
      - VNC_PORT=5900
      - VNC_PASSWORD=secret
    volumes:
      - chrome-data:/data/chrome-profile
    shm_size: "2gb"
    restart: unless-stopped

volumes:
  chrome-data:
